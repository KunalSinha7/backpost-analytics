version: 2
updates:
  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    commit-message:
      prefix: ⬆
    labels:
      - "internal"
      - "upgrade"
      - "github_actions"
    groups:
      github-actions:
        patterns:
          - "*"
  # Python uv
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    commit-message:
      prefix: ⬆
    labels: [upgrade, internal]
    groups:
      python-packages:
        patterns:
          - "*"
  # bun
  - package-ecosystem: bun
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    commit-message:
      prefix: ⬆
    labels: [upgrade, internal]
    ignore:
      - dependency-name: "@hey-api/openapi-ts"
    groups:
      npm-packages:
        patterns:
          - "*"
  # Docker
  - package-ecosystem: docker
    directories:
      - /backend
      - /frontend
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    commit-message:
      prefix: ⬆
    groups:
      docker:
        patterns:
          - "*"
  # Docker Compose
  - package-ecosystem: docker-compose
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    commit-message:
      prefix: ⬆
    groups:
      docker-compose:
        patterns:
          - "*"
  # pre-commit
  - package-ecosystem: "pre-commit"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    commit-message:
      prefix: ⬆
    labels:
      - "internal"
      - "upgrade"
      - "pre-commit"
    groups:
      pre-commit:
        patterns:
          - "*"
